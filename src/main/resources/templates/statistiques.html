<!-- src/main/resources/templates/mes-parties.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mes parties – BLOKUS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body {
            background-color: #faf3ff;
            font-family: 'Arial', sans-serif;
        }
        .container.main-container {
            padding-top: 80px;
            padding-bottom: 40px;
        }
        section {
            margin-bottom: 2rem;
            padding: 1rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        section h3 {
            margin-bottom: 1rem;
            text-align: left;
            font-weight: 600;
            color: #4B4B4B;
        }

        h3{
            font-size: 25px;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar (utilisateur=${utilisateur})"></div>

<div class="container main-container">
    <h2 class="mb-4 text-center">Mes statistiques</h2>

    <section>
        <h3>Parties terminées</h3>
        <span th:text="${stats.nbPartiesJouees}">0</span>
    </section>

    <section>
        <h3>Partie gagnées</h3>
        <span th:text="${stats.nbPartiesGagnees}">0</span>
    </section>

    <section>
        <h3>Ratio de victoire</h3>
        <p class="text-center mt-2">
            <span th:text="${#numbers.formatDecimal(stats.ratioPartiesGagnees * 100, 0, 'POINT', 1, 'COMMA')} + '%'">
                0%
            </span>
        </p>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

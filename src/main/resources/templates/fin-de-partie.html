<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fin de Partie - BLOKUS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body {
            background-color: #faf3ff;
        }
        .main-container {
            background-color: #FFFFFF;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 700px;
        }
        .winner-highlight {
            background-color: #e0ffe0;
            border: 2px solid #4CAF50;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .winner-highlight h2 {
            color: #4CAF50;
            font-size: 2rem;
        }
        .score-card {
            background-color: #F7F7F7;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 1rem;
        }
        .btn-home {
            background-color: #6C63FF;
            color: white;
            border: none;
        }
        .btn-home:hover {
            background-color: #5A54E1;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar (utilisateur=${utilisateur})"></div>
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="main-container text-center">
        <h1 class="mb-4">🎮 Fin de la Partie</h1>

        <div class="winner-highlight">
            <h2>
                🎉 Félicitations
                <span th:if="${#lists.size(nomsGagnants) == 1}" th:text="${nomsGagnants[0]}"></span>
                <span th:if="${#lists.size(nomsGagnants) > 1}">
        <span th:each="nom,iter : ${nomsGagnants}">
            <span th:text="${nom}"></span>
            <span th:if="${!iter.last}">, </span>
        </span>
    </span>
                !
            </h2>

            <p>Score : <strong th:text="${gagnantPoints}"></strong></p>
        </div>

        <h4 class="mb-3">Classement des joueurs</h4>

        <div class="score-card" th:each="joueur : ${joueurs}">
            <div>
                👤 <span th:text="${joueur.utilisateur.nom}"></span>
                <span class="color-circle" th:style="'background-color:' + ${joueur.couleur}"></span>
                <span class="badge bg-primary ms-2" th:text="${joueur.rang}"></span>
            </div>
            <div>Score : <strong th:text="${joueur.points}"></strong></div>
        </div>

        <div class="score-card" th:each="robot : ${partie.robots}">
            <div>
                🤖 <span th:text="${robot.nom}"></span>
                <span class="color-circle" th:style="'background-color:' + ${robot.couleur}"></span>
                <span class="badge bg-primary ms-2" th:text="${robot.rang}"></span>
            </div>
            <div>Score : <strong th:text="${robot.points}"></strong></div>
        </div>

        <a th:href="@{/blokus/home}" class="btn btn-home mt-4 px-4 py-2">
            <i class="fas fa-home"></i> Retour à l’accueil
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!-- src/main/resources/templates/mes-parties.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mes parties – BLOKUS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body {
            background-color: #faf3ff;
            font-family: 'Arial', sans-serif;
        }
        .container.main-container {
            padding-top: 80px;
            padding-bottom: 40px;
        }
        section {
            margin-bottom: 2rem;
            padding: 1rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        section h3 {
            margin-bottom: 1rem;
            text-align: left;
            font-weight: 600;
            color: #4B4B4B;
        }

        .btn-continuer {
            font-size: 0.875rem;
            padding: 0.25rem 0.75rem;
        }

        .player-card {
            background-color: #f1f1f1;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h3{
            font-size: 25px;
        }

    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar (utilisateur=${utilisateur})}"></div>

<div class="container main-container">
    <h2 class="mb-4 text-center">Mes parties</h2>

    <section>
        <h3>En attente</h3>
        <div th:if="${#lists.isEmpty(enAttente)}" class="text-muted">Aucune partie en attente.</div>
        <ul class="list-group">
            <li class="player-card" th:each="p : ${enAttente}">
                <span th:text="${p.nom}">Nom partie</span>
                <span class="badge bg-secondary ms-2"
                      th:text="${p.modeJeu != null ? p.modeJeu.label : 'Mode inconnu'}">Mode</span>
                <a th:href="@{/blokus/partie/{id}(id=${p.id})}"
                   class="btn btn-success btn-sm btn-continuer">
                    Continuer
                </a>
            </li>
        </ul>
    </section>

    <section>
        <h3>En cours</h3>
        <div th:if="${#lists.isEmpty(enCours)}" class="text-muted">Aucune partie en cours.</div>
        <ul class="list-group">
            <li class="player-card" th:each="p : ${enCours}">
                <span th:text="${p.nom}">Nom partie</span>
                <span class="badge bg-secondary ms-2"
                      th:text="${p.modeJeu != null ? p.modeJeu.label : 'Mode inconnu'}">Mode</span>
                <a th:href="@{/blokus/partie-en-cours/{id}(id=${p.id})}"
                   class="btn btn-success btn-sm btn-continuer">
                    Continuer
                </a>
            </li>
        </ul>

    </section>

    <section>
        <h3>Terminées</h3>
        <div th:if="${#lists.isEmpty(terminees)}" class="text-muted">
            Aucune partie terminée.
        </div>
        <ul class="list-group">
            <li class="player-card" th:each="p : ${terminees}">
                <span th:text="${p.nom}">Nom partie</span>
                <span class="badge bg-secondary ms-2"
                      th:text="${p.modeJeu != null ? p.modeJeu.label : 'Mode inconnu'}">Mode</span>
                <span class="badge bg-primary ms-2"
                      th:if="${rangMap[p.id] != null}"
                      th:text="'Rang : ' + ${rangMap[p.id]}">
            Rang
        </span>
            </li>
        </ul>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

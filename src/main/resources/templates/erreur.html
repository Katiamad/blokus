<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Erreur - BLOKUS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #faf3ff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            flex: 1;
        }
        .error-box {
            background-color: #fff;
            border-radius: 15px;
            padding: 2.5rem 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            margin-top: 4rem;
            text-align: center;
        }
        .error-icon {
            font-size: 3rem;
            color: #e94d51;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            font-weight: bold;
            color: #4B4B4B;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.15rem;
            color: #6C63FF;
            margin-bottom: 2rem;
            min-height: 2em;
        }
        .btn-primary {
            background-color: #6C63FF;
            border-color: #6C63FF;
            transition: all 0.3s ease-in-out;
            padding: 10px 22px;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background-color: #5A54E1;
            border-color: #5A54E1;
            transform: scale(1.05);
        }
        @media (max-width: 992px) {
            .error-box {
                max-width: 90%;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container main-container">
    <div class="error-box">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <div class="error-title">Oups ! Une erreur est survenue</div>
        <div class="error-message" th:text="${error} ?: 'Erreur inconnue, veuillez réessayer plus tard.'"></div>
        <a href="/blokus/home" class="btn btn-primary mt-2">
            <i class="bi bi-house-door-fill"></i> Retour à l'accueil
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

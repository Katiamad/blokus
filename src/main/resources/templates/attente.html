<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Salle d'attente - BLOKUS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>

        body {
            background-color: #faf3ff;
        }

        .btn-primary {
            background-color: #6C63FF;
            border-color: #6C63FF;
        }
        .btn-primary:hover {
            background-color: #5A54E1;
            border-color: #5A54E1;
        }
        h1, h2 {
            color: #4B4B4B;
        }
        .text-muted {
            color: #6C6C6C;
        }
        .text-center {
            color: #4B4B4B;
        }

        .main-container {
            background-color: #FFFFFF;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0; /* Supprimer les marges */
        }

        .player-card {
            background-color: #F7F7F7;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .invite-link {
            background-color: #6C63FF;
            text-align: center;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin: 0.75rem 0;
            transition: background-color 0.3s ease;
            font-size: 0.9rem;
        }

        .invite-link:hover {
            background-color: #FFC8DD;
            background-color: #BDB2FF ;
            color: #BDE0FE;
            text-decoration: none;
        }

        .btn-start {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon {
            font-size: 1.2rem;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
        }

    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar (utilisateur=${utilisateur})"></div>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="main-container">
        <h1 class="text-center mb-4 fs-5">Bienvenue dans la salle d'attente</h1>
        <h2 class="text-center text-muted fs-6 mb-4">Nom de la partie : <strong>[[${partie.nom}]]</strong></h2>
        <h3 class="text-center text-muted fs-6 mb-4">Invitez des amis :</h3>
        <div class="text-center invite-link">
            <i class="fas fa-link icon"></i> localhost:8080/blokus/partie/[[${partie.id}]]
        </div>

        <div class="player-list mt-4">
            <h3 class="text-center mb-3 fs-6">Joueurs connectés :</h3>
            <div class="player-card" th:each="joueur : ${joueurs}">
                <span th:text="${joueur.utilisateur.nom}"></span>
                <div class="color-circle" th:style="'background-color: ' + ${joueur.couleur} + ';'"></div>
            </div>
            <div class="player-card" th:each="robot : ${partie.robots}">
                <span th:text="${robot.nom}"></span>
                <div class="color-circle" th:style="'background-color: ' + ${robot.couleur} + ';'"></div>
            </div>
        </div>

        <div th:if="${partie.createurId == utilisateur.id && partie.status == T(fr.orleans.m1miage.project.s2.projetS2.model.Status).EN_ATTENTE}">
            <form th:action="@{'/blokus/start/' + ${partie.id}}" method="post">
                <button type="submit" class="btn btn-primary btn-start">
                    <i class="fas fa-play icon"></i> Démarrer la partie
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.2/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:inline="javascript">
    const partieId = [[${partie.id}]];
    let stompClient = null;

    function connectWebSocket() {
        const socket = new SockJS('/blokus-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, frame => {
            stompClient.subscribe(
                '/topic/attente-updates/' + partieId,
                msg => {
                    const update = JSON.parse(msg.body);
                    if (update.reload) window.location.reload();
                }
            );

            stompClient.subscribe(
                '/topic/status-updates/' + partieId,
                msg => {
                    const update = JSON.parse(msg.body);
                    if (update.reload && update.status === 'EN_COURS') {
                        window.location.href = '/blokus/partie-en-cours/' + partieId;
                    }
                }
            );

        });
    }

    connectWebSocket();

</script>


</body>
</html>

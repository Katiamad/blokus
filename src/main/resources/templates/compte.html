<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Compte - BLOKUS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body {
            background-color: #faf3ff;
            margin-top: 80px;
        }
        .sidebar {
            min-width: 250px;
            background: #f3e2ff;
            padding: 20px;
            border-radius: 10px;
            height: auto;
            max-height: 200px;
        }
        .sidebar a {
            display: block;
            padding: 12px;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .content {
            flex-grow: 1;
            background-color: #FFFFFF;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .card {
            background-color: #FFFFFF;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .btn-save {
            float: right;
            background-color: #6C63FF;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn-save:hover {
            background-color: #5A54E1;
        }

        h1, h5 {
            color: #4B4B4B;
        }
        .text-muted {
            color: #6C6C6C;
        }


        .sidebar a.general:hover,
        .sidebar button.general:hover {
            text-decoration: none;
            background-color: #edd3fb;
        }
        .btn-link {
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                margin-bottom: 20px;
            }

            .content {
                width: 100%;
            }

            .d-flex {
                flex-direction: column;
            }
        }

        .text-primary{
            color: #333;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar (utilisateur=${utilisateur})"></div>

<div class="container mt-5">
    <h1 class="text-center fw-bold">Compte</h1>
    <p class="text-center text-muted">Modifiez votre profil</p>

    <div class="d-flex mt-4">
        <div class="sidebar me-4 d-flex flex-column">
            <a href="#" class="fw-bold text-primary general"> Général</a>
            <a class="fw-bold text-primary general">
                <form th:action="@{/blokus/suppression}"
                      method="post"
                      onsubmit="return confirm('Voulez-vous vraiment supprimer votre compte ? Cette action est irréversible.');">
                    <button type="submit"
                            class="btn btn-link p-0 general fw-bold text-primary">
                        Supprimer le compte
                    </button>
                </form>
            </a>
        </div>


        <div class="content">
            <form th:action="@{/blokus/modificationNom}" method="post">
                <div class="card mb-3">
                    <h5>Nom d'utilisateur</h5>
                    <p class="text-muted">Si vous changez votre nom d'utilisateur, tous les liens existants vers votre profil deviendront inaccessibles.</p>
                    <input type="text" id="nom" name="nom" class="form-control" th:value="${utilisateur.nom}" required>
                    <input type="submit" class="btn btn-primary btn-save mt-2" value="Enregistrer">
                </div>
            </form>

            <form th:action="@{/blokus/modificationEmail}" method="post">
                <div class="card mb-3 mt-4">
                    <h5>Email</h5>
                    <input type="email" id="email" name="email" class="form-control" th:value="${utilisateur.email}" required>
                    <input type="submit" class="btn btn-primary btn-save mt-2" value="Enregistrer">
                </div>
            </form>

            <form th:action="@{/blokus/modificationMotDePasse}" method="post">
                <div class="card mb-3 mt-4">
                    <h5>Changer le mot de passe</h5>
                    <label for="currentPassword" class="form-label">Mot de passe actuel</label>
                    <input type="password" id="currentPassword" name="currentPassword" class="form-control">
                    <label for="motDePasse" class="form-label mt-2">Nouveau mot de passe</label>
                    <input type="password" id="motDePasse" name="motDePasse" class="form-control">
                    <input type="submit" class="btn btn-primary btn-save mt-2" value="Enregistrer">
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

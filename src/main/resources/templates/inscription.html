<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inscription Utilisateur</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #ffdfec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register-container {
            background: #FFFFFF;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .register-container h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px;
        }
        .btn-primary {
            background-color: #6C63FF;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #5A54E1;
        }
        .footer-link {
            color: #6C63FF;
            font-weight: 500;
        }
        .footer-link:hover {
            text-decoration: underline;
        }
        .form-group {
            text-align: left;
        }
        .password-error {
            color: red;
            font-size: 14px;
            display: none;
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h1>Inscription</h1>

    <div th:if="${error}" class="alert alert-danger text-center" role="alert">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/blokus/inscription}" method="post" th:object="${utilisateur}" class="mx-auto">
        <div class="form-group mb-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" id="nom" name="nom" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label for="motDePasse" class="form-label">Mot de Passe</label>
            <div class="password-container">
                <input type="password" id="motDePasse" name="motDePasse" class="form-control" required>
                <img src="/images/show.png" alt="Afficher" class="toggle-password" id="togglePassword">
            </div>
            <p class="password-error" id="password-error">Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule et un chiffre.</p>
        </div>
        <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
    </form>

    <div class="mt-3">
        <p>Déjà inscrit ? <a href="/blokus/connexion" class="footer-link">Se connecter</a></p>
    </div>
</div>

<script>
    const passwordInput = document.getElementById("motDePasse");
    const togglePassword = document.getElementById("togglePassword");

    const showIcon = togglePassword.getAttribute("src");
    const hideIcon = showIcon.replace("show.png", "hide.png");

    togglePassword.addEventListener("click", function () {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            togglePassword.src = hideIcon;
        } else {
            passwordInput.type = "password";
            togglePassword.src = showIcon;
        }
    });

    document.querySelector("form").addEventListener("submit", function(event) {
        let password = passwordInput.value;
        let passwordError = document.getElementById("password-error");

        let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
        if (!regex.test(password)) {
            passwordError.style.display = "block";
            event.preventDefault();
        } else {
            passwordError.style.display = "none";
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<style>

</style>
<body>
<div th:fragment="navbar (utilisateur)">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-custom">
        <div class="container">
            <a th:href="@{/blokus/home}" class="navbar-brand text-white">Blokus</a>
            <div class="d-flex align-items-center">
                <span class="text-white user-name" th:text="${utilisateur != null} ? ${utilisateur.nom} : ''">Nom</span>
                <div class="dropdown">
                    <button class="btn btn-light rounded-circle profile-btn d-flex align-items-center justify-content-center"
                            id="dropdownMenuButton" data-bs-toggle="dropdown">
                        <img th:src="@{/images/kitty.png}" alt="Profil"
                             class="rounded-circle img-fluid">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a th:href="@{/blokus/historique}" class="dropdown-item">Mes parties</a></li>
                        <li><a th:href="@{/blokus/statistique}" class="dropdown-item">Mes statistiques</a></li>
                        <li><a th:href="@{/blokus/compte}" class="dropdown-item">Compte</a></li>
                        <li>
                            <form th:action="@{/blokus/deconnexion}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    Se déconnecter
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
